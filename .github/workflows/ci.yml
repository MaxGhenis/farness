name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: site

      - name: Type check
        run: bunx tsc -b
        working-directory: site

      - name: Test
        run: bun run test
        working-directory: site

      - name: Build
        run: bun run build
        working-directory: site
