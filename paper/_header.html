<header id="farness-header" style="
  position: sticky;
  top: 0;
  z-index: 1050;
  width: 100%;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background-color: rgba(252, 253, 254, 0.85);
  border-bottom: 1px solid #D9E4EC;
">
  <div style="
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  ">
    <!-- Logo + wordmark -->
    <a href="/" style="
      display: flex;
      align-items: center;
      gap: 0.35em;
      text-decoration: none;
      font-family: 'Newsreader', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #14202B;
      letter-spacing: -0.01em;
    ">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Farness">
        <circle cx="21.5" cy="14" r="5.5" fill="#A94E80" opacity="0.10"/>
        <line x1="2" y1="4.5" x2="17" y2="12" stroke="#9FB6C6" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
        <line x1="2" y1="23.5" x2="17" y2="16" stroke="#9FB6C6" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
        <circle cx="21.5" cy="14" r="3.2" fill="#A94E80"/>
      </svg>
      <span>farness</span>
    </a>

    <!-- Navigation -->
    <nav style="display: flex; gap: 1.75rem; align-items: center;">
      <a href="/thesis" style="
        font-family: 'IBM Plex Sans', sans-serif;
        font-size: 0.82rem;
        font-weight: 400;
        text-decoration: none;
        color: #6B7C89;
        transition: color 0.2s;
      " onmouseover="this.style.color='#14202B'" onmouseout="this.style.color='#6B7C89'">Thesis</a>

      <a href="/paper/" style="
        font-family: 'IBM Plex Sans', sans-serif;
        font-size: 0.82rem;
        font-weight: 400;
        text-decoration: none;
        color: #A94E80;
      ">Research</a>

      <a href="https://github.com/MaxGhenis/farness" style="
        font-family: 'IBM Plex Sans', sans-serif;
        font-size: 0.82rem;
        font-weight: 400;
        text-decoration: none;
        color: #6B7C89;
        transition: color 0.2s;
      " onmouseover="this.style.color='#14202B'" onmouseout="this.style.color='#6B7C89'">GitHub</a>

      <a href="https://github.com/MaxGhenis/farness#installation" style="
        font-family: 'IBM Plex Sans', sans-serif;
        font-size: 0.78rem;
        font-weight: 600;
        text-decoration: none;
        padding: 0.35em 1em;
        border-radius: 0.5rem;
        background-color: #14202B;
        color: #FCFDFE;
        transition: transform 0.2s;
      " onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">Install</a>
    </nav>
  </div>
</header>
